version: '3.8'

services:
  app:
    build: .
    container_name: youtube-music-live
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./assets:/app/assets
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
      - LOCAL_RTMP_TEST=${LOCAL_RTMP_TEST}
      - STREAM_VISUALIZER=${STREAM_VISUALIZER}
      - PIPER_URL=http://piper:5000
    depends_on:
      - piper
      - rtmp

  piper:
    image: artibex/piper-http:latest
    container_name: youtube-music-live-piper
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MODEL_DOWNLOAD_LINK=https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/lessac/medium/en_US-lessac-medium.onnx?download=true
    volumes:
      - ./data/tts_cache:/app/models

  rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: youtube-music-live-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"


